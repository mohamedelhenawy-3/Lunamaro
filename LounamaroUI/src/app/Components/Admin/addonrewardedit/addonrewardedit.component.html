<div class="edit-container">
  <h2>Edit Add-on Reward</h2>

  <div class="form-group">
    <label>Target Product</label>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="onSearch()"
      placeholder="Search product..."
    />
    
    <div class="dropdown" *ngIf="products.length">
      <div
        *ngFor="let p of products"
        (click)="selectProduct(p)"
        class="dropdown-item"
      >
        {{ p.name }}
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>Minimum Amount ($)</label>
    <input 
      type="number" 
      [(ngModel)]="minimumAmount" 
      placeholder="0.00" 
    />
  </div>

  <div class="checkbox-group">
    <label>
      <input type="checkbox" [(ngModel)]="isActive" />
      <span>Active Reward</span>
    </label>
  </div>

  <div class="button-group">
    <button (click)="updateDeal()" class="btn-update">Update Reward</button>
    <button (click)="cancel()" class="btn-cancel">Cancel</button>
  </div>
</div>
