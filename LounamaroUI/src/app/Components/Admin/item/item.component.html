<div class="item-container">

  <!-- Search Bar -->
  <div class="search-wrapper" style="margin-bottom: 20px; text-align: center;">
    <input 
      type="text" 
      placeholder="Search items..." 
      [(ngModel)]="searchTerm" 
      (input)="applyFilter()" 
      style="padding: 8px 12px; border-radius: 8px; width: 250px; border: 1px solid #EFB036;"
    />
  </div>

  <div class="item-row">
    <div class="item-card" *ngFor="let item of Items">
      <img [src]="'http://localhost:5218' + item.imageUrl" class="item-image" alt="Product Image" />

      <div class="item-body">
        <h5 class="item-title">{{ item.name }}</h5>
        <p class="item-description">{{ item.description }}</p>
        <p class="item-description">Qty: {{ item.quantity }}</p>
        <p class="item-price">$ {{ item.price }}</p>

        <div class="item-actions">
          <button class="btn-update" (click)="ViewItem(item.id)">Update</button>
          <button class="btn-delete" (click)="deleteItem(item.id)">Delete</button>
        </div>
      </div>

    </div>
  </div>

</div>
